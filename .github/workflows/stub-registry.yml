# Cross-stub registry (M2.5 Phase 3a). Publishes the prebuilt `phg build --target` runtime stubs that a
# *distributed* (sourceless) phg downloads + sha256-verifies (src/bundle/cross.rs::download_stub against
# the manifest baked by build.rs). Complements release.yml (which ships the human-facing per-OS
# archives); this workflow adds the cross stubs + a manifest-baked Linux primary used for cross-builds.
#
# Two passes break the stub<->manifest circularity (design docs/specs/2026-06-17-m2.5-phase3a-…):
#   1. build the 4 cross stubs with PHORJ_BAKE_STUB_MANIFEST UNSET  -> their bytes are manifest-
#      independent, so their sha256 is stable;
#   2. hash each stub, write the manifest, then build the x86_64-linux primary with
#      PHORJ_BAKE_STUB_MANIFEST=<that manifest>  -> the released primary carries the manifest.
# No secrets: unsigned cross stubs need no certs; publishing uses the Actions GITHUB_TOKEN. Signing
# (--sign) and the macOS stub are Phase 3b.
name: stub-registry

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create/update the release and upload stub + primary assets

env:
  CARGO_TERM_COLOR: always
  ZIG_VERSION: "0.16.0"

jobs:
  build-stubs:
    name: stub ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - x86_64-pc-windows-gnu
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned Rust toolchain
        run: rustup show
      - name: Add rustup target
        run: rustup target add ${{ matrix.target }}
      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}
      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild
      # PHORJ_BAKE_STUB_MANIFEST is intentionally UNSET here (empty manifest -> stable stub bytes).
      - name: Build stub
        run: cargo zigbuild --release --bin phg --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "--cap-lints=warn"
      - name: Stage stub as phg-stub-<triple>[.exe]
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p stubs
          t="${{ matrix.target }}"
          if [[ "$t" == *windows* ]]; then
            cp "target/$t/release/phg.exe" "stubs/phg-stub-$t.exe"
          else
            cp "target/$t/release/phg" "stubs/phg-stub-$t"
          fi
          ls -l stubs/
      - name: Upload stub artifact
        uses: actions/upload-artifact@v7
        with:
          name: stub-${{ matrix.target }}
          path: stubs/*

  primary-and-publish:
    name: manifest + primary + publish
    needs: build-stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned Rust toolchain
        run: rustup show
      - name: Download all stub artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: stub-*
          path: stubs
          merge-multiple: true
      # Pass 2: compute each stub's sha256 (host sha256sum — the client verifies with its hand-rolled
      # SHA-256; CI agreeing with it is a cross-implementation check), then build the manifest.
      - name: Build the sha256 manifest
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "# phg cross-stub integrity manifest (M2.5 Phase 3a) — generated by CI"
            echo "version ${GITHUB_REF_NAME#v}"
            for f in stubs/phg-stub-*; do
              base="$(basename "$f")"
              triple="${base#phg-stub-}"
              triple="${triple%.exe}"
              hash="$(sha256sum "$f" | cut -d' ' -f1)"
              echo "$triple $hash"
            done
          } > stub_manifest.txt
          cat stub_manifest.txt
      - name: Build the manifest-baked Linux primary
        run: cargo build --release --bin phg --target x86_64-unknown-linux-gnu
        env:
          RUSTFLAGS: "--cap-lints=warn"
          PHORJ_BAKE_STUB_MANIFEST: stub_manifest.txt
      - name: Stage the primary
        shell: bash
        run: |
          set -euo pipefail
          cp target/x86_64-unknown-linux-gnu/release/phg phg-x86_64-unknown-linux-gnu
          ls -l phg-x86_64-unknown-linux-gnu stubs/
      # Pass 3: publish the stubs + the cross-capable primary as release assets for the tag. The asset
      # names (phg-stub-<triple>) match manifest::asset_name + cross.rs's download URL convention.
      - name: Publish stubs + primary to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            stubs/phg-stub-*
            phg-x86_64-unknown-linux-gnu
            stub_manifest.txt
      - name: Upload run artifacts (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: stub-registry-bundle
          path: |
            stubs/phg-stub-*
            phg-x86_64-unknown-linux-gnu
            stub_manifest.txt
