# Build the `phg` binary for Linux, Windows, and macOS and attach the archives to a GitHub Release.
#
# Native runners per OS (not cross-compilation): each target builds on its own platform, so the
# binary is correctly linked — and it fills the macOS gap that `phg build --target` defers.
#
# Release channels (DEC-323):
#   nightly — every push to master rebuilds the 4 archives and the `publish-nightly` job re-points
#             the rolling `nightly` tag + prerelease at that commit with the fresh binaries attached.
#   stable  — publishing a `v*` Release triggers the same matrix and each job attaches its archive
#             to that release (the pre-existing path, unchanged).
# `workflow_dispatch` builds the archives and uploads them as run artifacts only (pipeline dry-run).
name: release

on:
  push:
    branches:
      - master
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # upload assets onto the release

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: phg-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: phg-windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: phg-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: phg-macos-aarch64
    steps:
      - uses: actions/checkout@v7

      # rust-toolchain.toml pins the channel; add this matrix entry's target on top of it.
      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # --cap-lints=warn mirrors ci.yml's cross-build job: a platform-specific lint must not trip the
      # core crate's `warnings = "deny"` gate on Windows/macOS where the native build is verified.
      - name: Build phg
        run: cargo build --release --bin phg --target ${{ matrix.target }}
        env:
          RUSTFLAGS: "--cap-lints=warn"

      # Package: tar.gz on Unix, zip on Windows. Bundle the binary with the licenses + README so each
      # archive is a self-contained distributable. `staging/` holds exactly what ships.
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/phg" staging/
          strip staging/phg || true
          cp LICENSE-MIT LICENSE-APACHE README.md staging/
          tar -czf "${{ matrix.asset }}.tar.gz" -C staging .
          ls -l "${{ matrix.asset }}.tar.gz"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/phg.exe" staging/
          Copy-Item LICENSE-MIT, LICENSE-APACHE, README.md staging/
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.asset }}.zip" -Force
          Get-ChildItem "${{ matrix.asset }}.zip"

      # Always keep the archive as a run artifact — lets workflow_dispatch verify the build with no release.
      - name: Upload run artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.zip
          if-no-files-found: ignore

      # On a published release, attach the archive to that release.
      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ matrix.asset }}.tar.gz
            ${{ matrix.asset }}.zip

  # The nightly channel (DEC-323): on every master push, re-point the rolling `nightly` tag at this
  # commit and publish a prerelease carrying all four archives. Delete-then-recreate (instead of
  # editing in place) so stale assets from the previous nightly can never linger. Runs AFTER the whole
  # matrix so a nightly is only cut when all four platforms built. No recursion: events created with
  # the workflow's own GITHUB_TOKEN do not trigger new workflow runs, so publishing the nightly
  # release does NOT re-fire this workflow's `release:` trigger.
  publish-nightly:
    name: publish nightly prerelease
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all archives
        uses: actions/download-artifact@v8
        with:
          pattern: phg-*
          path: assets
          merge-multiple: true

      # `gh` is preinstalled on GitHub runners; GITHUB_TOKEN + `contents: write` (set at workflow
      # level) covers release + tag management. `--latest=false` keeps the "Latest" badge on the
      # newest stable `v*` release — nightly is a prerelease channel, never the storefront.
      - name: Recreate the rolling nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ls -l assets/
          gh release delete nightly --yes || true
          git push origin :refs/tags/nightly || true
          git push origin "+${GITHUB_SHA}:refs/tags/nightly"
          gh release create nightly assets/* \
            --prerelease \
            --latest=false \
            --title "nightly (${GITHUB_SHA:0:7})" \
            --notes "Rolling nightly build from \`master\` @ ${GITHUB_SHA}. Rebuilt and re-pointed on every push to master — do not pin to these assets; use a \`v*\` release for anything durable."
