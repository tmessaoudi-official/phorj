name: CI

# Locks in the M7 correctness closure. The `gate` job runs the SAME three checks as the local
# pre-commit hook (scripts/git-hooks/pre-commit) — fmt + clippy(-D warnings) + the full test
# suite — and additionally sets PHORJ_REQUIRE_PHP=1 so the PHP oracle in tests/differential.rs
# FAILS (never silently skips) if transpiled PHP diverges from the interpreter/VM. The
# `cross-build` job exercises `phg build --target` parity across the four Phase-2 cross targets.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# A newer push to the same ref cancels the in-flight run — saves CI minutes on rapid iteration.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    name: gate (fmt + clippy + test + PHP oracle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # rustup honours rust-toolchain.toml (channel 1.96.0 + rustfmt + clippy components).
      # `rustup show` installs that pinned toolchain and its components on first use, so the
      # CI lints are byte-for-byte the ones a local commit faces — no floating-stable drift.
      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      # The PHP oracle needs a real `php`. 8.5 is the transpile floor — testing against the floor is
      # the strict gate (output valid on 8.5 also runs on 8.6+; testing only on a newer build would
      # let an 8.5-incompatible construct slip through). Transpiled output uses core functions
      # (intdiv / fmod / range / strpos / explode / echo) plus BCMath for `decimal` (M-NUM). The oracle
      # runs `php -n` (hermetic), which disables ini-loaded shared extensions, so the harness loads
      # bcmath explicitly via `-d extension=bcmath` — `extensions: bcmath` here installs that `.so`.
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: bcmath

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      # PHORJ_REQUIRE_PHP=1 turns a missing or non-working php into a test FAILURE — this is the
      # enforcement CI adds on top of the local hook (which runs the oracle only when php happens
      # to be on PATH). This line is what "locks in" M7. --workspace also gates the playground crate.
      - name: cargo test (PHP oracle enforced)
        env:
          PHORJ_REQUIRE_PHP: '1'
        run: cargo test --workspace

  perf-gate:
    # Lane 2 W1: block a gross VM performance regression. scripts/perf-gate.sh gates on `vm_speedup`
    # (tree-walk / VM ratio) from `phg benchmark --json` — machine-independent (both backends share the
    # CPU), unlike absolute ns. Timing noise is one-directional (only ever slows a run), so the script
    # takes best-of-N and a generous floor (bench/baseline.json: baseline_vm_speedup * min_ratio ≈ 10.8
    # vs a true ~20-25) — huge margin, so a noisy runner still clears it while a real ~1.7x+ regression
    # trips it. If a shared runner ever false-fails, lower min_ratio in the baseline or set
    # continue-on-error here; do not delete the gate.
    name: perf-gate (VM regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned Rust toolchain
        run: rustup show
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --bin phg
      - name: Run perf gate
        run: bash scripts/perf-gate.sh

  unsafe-island:
    # Domain #7 (native codegen / JIT) will carry phorj's only first-party `unsafe`, confined to
    # src/jit/ via a crate-root `#![deny(unsafe_code)]` + a single `#![allow(unsafe_code)]` island.
    # `deny` (unlike `forbid`) permits a scoped allow, so this gate machine-enforces the confinement:
    # it fails if an `allow(unsafe_code)` escape hatch appears anywhere outside src/jit/. At HEAD the
    # root is still `#![forbid(unsafe_code)]` with no allow anywhere, so it passes trivially — it arms
    # for the forbid->deny downgrade that lands with the first codegen slice.
    name: unsafe-island (first-party unsafe confined to src/jit/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: No allow(unsafe_code) outside src/jit/
        run: |
          hits="$(grep -rnE 'allow[[:space:]]*\([[:space:]]*unsafe_code' src --include='*.rs' | grep -v '^src/jit/' || true)"
          if [ -n "$hits" ]; then
            echo "unsafe-island: FAIL — allow(unsafe_code) outside src/jit/ (first-party unsafe must live only in the JIT island):" >&2
            echo "$hits" >&2
            exit 1
          fi
          echo "unsafe-island: OK — no allow(unsafe_code) escape outside src/jit/"

  oracle-nightly:
    # Non-gating canary: run the PHP oracle against the in-development 8.6 so bleeding-edge breakage
    # surfaces early. continue-on-error keeps a flaky/unavailable dev build from failing CI — the 8.5
    # `gate` job above is the reproducible source of truth.
    name: oracle on 8.6-dev (non-gating)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Install pinned Rust toolchain
        run: rustup show
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
      - name: Install PHP 8.6 (dev)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.6'
          extensions: bcmath
      - name: cargo test --test differential (PHP oracle, 8.6-dev)
        env:
          PHORJ_REQUIRE_PHP: '1'
        run: cargo test --test differential

  cross-build:
    name: cross-build (phg build --target parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install pinned Rust toolchain
        run: rustup show

      - name: Add cross targets
        run: >
          rustup target add
          x86_64-unknown-linux-musl
          aarch64-unknown-linux-gnu
          aarch64-unknown-linux-musl
          x86_64-pc-windows-gnu

      # llvm-objcopy embeds the `.phorj` section into the cross-built stub (src/bundle/cross.rs).
      # The toolchain's llvm-tools-preview ships a version-matched copy; PHORJ_OBJCOPY points the
      # build at it (the binary is not on PATH under that name otherwise).
      - name: Install llvm-objcopy (llvm-tools-preview)
        run: |
          rustup component add llvm-tools-preview
          OBJ="$(find "$(rustc --print sysroot)" -name 'llvm-objcopy' | head -n1)"
          test -n "$OBJ" || { echo "llvm-objcopy not found in sysroot"; exit 1; }
          echo "PHORJ_OBJCOPY=$OBJ" >> "$GITHUB_ENV"

      # Zig is the cross-linker cargo-zigbuild drives. Installed directly from the official, pinned
      # STABLE release rather than a setup action: the mirror-based actions default to an *ephemeral*
      # nightly (0.16.0-dev had rotated off every mirror → 404) and used a stale filename ordering.
      # A pinned stable release at ziglang.org/download/<ver>/ is permanent + deterministic; only
      # `zig` on PATH is required.
      - name: Install Zig
        run: |
          ZIG_VERSION=0.16.0
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o /tmp/zig.tar.xz
          mkdir -p "$HOME/zig"
          tar -xf /tmp/zig.tar.xz -C "$HOME/zig" --strip-components=1
          echo "$HOME/zig" >> "$GITHUB_PATH"

      - name: Verify zig
        run: zig version

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      # build.rs already exercises x86_64-musl (native exec) and windows-gnu (PE round-trip).
      # This smoke covers the two aarch64 targets it does not run, so a broken aarch64 build still
      # surfaces. --cap-lints=warn mirrors cross.rs so target-specific lints don't trip the deny gate.
      - name: cargo zigbuild (aarch64 cross smoke)
        env:
          RUSTFLAGS: --cap-lints=warn
        run: |
          for t in aarch64-unknown-linux-gnu aarch64-unknown-linux-musl; do
            echo "::group::zigbuild $t"
            cargo zigbuild --release --bin phg --target "$t"
            echo "::endgroup::"
          done

      # The real cross-parity tests: now that cargo-zigbuild, the targets, and llvm-objcopy are all
      # present, tests/build.rs executes (instead of skipping) the musl native-exec and windows PE
      # round-trip assertions.
      - name: cargo test --test build -- --test-threads=1 (cross parity)
        run: cargo test --test build -- --test-threads=1
